<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Työkalut</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Nunito', sans-serif; }
    .card { transition: transform 0.15s ease, box-shadow 0.15s ease; }
    .card:active { transform: scale(0.97); }
  </style>
</head>
<body class="min-h-screen bg-[#f3f6ff] p-6">

  <div class="max-w-sm mx-auto">
    <header class="mb-8 pt-4">
      <h1 class="text-3xl font-black text-gray-900">Työkalut</h1>
      <p class="text-gray-500 font-medium mt-1">Pikasovellukset ja demot</p>
    </header>

    <div class="space-y-3">

      <!-- Math flashcards -->
      <a href="math.html" class="card block rounded-3xl px-5 py-4 no-underline"
         style="background:linear-gradient(135deg,rgba(37,99,235,0.13),rgba(255,255,255,0.95));border:1.5px solid rgba(37,99,235,0.22);box-shadow:0 6px 24px rgba(0,0,0,0.10),inset 0 1px 0 rgba(255,255,255,0.90)">
        <div class="flex items-center gap-4">
          <div class="text-4xl">🧮</div>
          <div>
            <div class="font-black text-gray-900 text-lg">Laskuharjoitus</div>
            <div class="text-sm text-gray-500 font-medium">Nelinumeroiset yhteen- ja vähennyslaskut kääntökorteilla</div>
          </div>
          <div class="ml-auto text-gray-300 text-xl">›</div>
        </div>
      </a>

      <!-- Design demo -->
      <a href="colors.html" class="card block rounded-3xl px-5 py-4 no-underline"
         style="background:linear-gradient(135deg,rgba(139,92,246,0.13),rgba(255,255,255,0.95));border:1.5px solid rgba(139,92,246,0.22);box-shadow:0 6px 24px rgba(0,0,0,0.10),inset 0 1px 0 rgba(255,255,255,0.90)">
        <div class="flex items-center gap-4">
          <div class="text-4xl">🎨</div>
          <div>
            <div class="font-black text-gray-900 text-lg">Värimaailma</div>
            <div class="text-sm text-gray-500 font-medium">Kiekkokisan design-demo eri teemaväreillä</div>
          </div>
          <div class="ml-auto text-gray-300 text-xl">›</div>
        </div>
      </a>

    </div>
  </div>

</body>
</html>
