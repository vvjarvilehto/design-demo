<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tietovisa</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#7c3aed" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Tietovisa" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Nunito', sans-serif; }
    .btn-topic { transition: transform 0.13s ease, box-shadow 0.13s ease; }
    .btn-topic:active { transform: scale(0.96); }
    .btn-answer { transition: transform 0.12s ease, background 0.15s ease; }
    .btn-answer:active { transform: scale(0.97); }
    .btn-answer.correct { background: linear-gradient(135deg,#bbf7d0,#dcfce7) !important; border-color: #16a34a !important; }
    .btn-answer.wrong   { background: linear-gradient(135deg,#fecaca,#fee2e2) !important; border-color: #dc2626 !important; }
    .btn-answer.reveal  { opacity: 0.45; }
    .progress-bar { transition: width 0.4s cubic-bezier(.4,0,.2,1); }
    @keyframes pop-in {
      0%   { transform: scale(0.85); opacity: 0; }
      60%  { transform: scale(1.04); }
      100% { transform: scale(1);    opacity: 1; }
    }
    .pop-in { animation: pop-in 0.3s ease forwards; }
  </style>
</head>
<body class="min-h-screen bg-[#f3f6ff] p-5">

<div class="max-w-sm mx-auto">

  <!-- Takaisin-linkki -->
  <a href="index.html" class="inline-flex items-center gap-1 text-sm font-semibold text-gray-400 hover:text-gray-600 mb-6 mt-2 transition-colors">
    ‹ Etusivulle
  </a>

  <!-- ── NÄKYMÄ 1: Aihevalinta ── -->
  <div id="screen-topics">
    <header class="mb-7">
      <div class="text-4xl mb-2">🧠</div>
      <h1 class="text-3xl font-black text-gray-900">Tietovisa</h1>
      <p class="text-gray-500 font-medium mt-1">Valitse aihe ja testaa tietosi</p>
    </header>

    <div class="space-y-3" id="topic-list"></div>

    <!-- JSON-lataus -->
    <div class="mt-5">
      <input type="file" id="json-input" accept=".json" class="hidden" />
      <button onclick="document.getElementById('json-input').click()"
              class="w-full py-3 rounded-2xl font-bold text-sm border-2 border-dashed transition-colors"
              style="border-color:rgba(124,58,237,0.30);color:#7c3aed;background:rgba(124,58,237,0.05)">
        + Lataa kysymykset JSON-tiedostosta
      </button>
      <p id="json-status" class="text-center text-xs font-semibold mt-2 text-gray-400 hidden"></p>
    </div>
  </div>

  <!-- ── NÄKYMÄ 2: Kysymys ── -->
  <div id="screen-quiz" class="hidden">
    <!-- Yläpalkki -->
    <div class="flex items-center justify-between mb-1">
      <span id="q-label" class="text-sm font-bold text-gray-400"></span>
      <span id="score-label" class="text-sm font-bold text-gray-400"></span>
    </div>
    <!-- Edistymispalkki -->
    <div class="w-full h-2 bg-gray-200 rounded-full mb-6 overflow-hidden">
      <div id="progress-bar" class="progress-bar h-2 rounded-full bg-gradient-to-r from-violet-500 to-fuchsia-500" style="width:0%"></div>
    </div>

    <!-- Kysymyskortti -->
    <div id="q-card" class="rounded-3xl p-5 mb-5"
         style="background:linear-gradient(135deg,rgba(139,92,246,0.10),rgba(255,255,255,0.95));border:1.5px solid rgba(139,92,246,0.20);box-shadow:0 6px 24px rgba(0,0,0,0.09),inset 0 1px 0 rgba(255,255,255,0.90)">
      <div id="q-category" class="text-xs font-bold uppercase tracking-widest mb-3" style="color:#7c3aed"></div>
      <p id="q-text" class="text-gray-900 font-black text-xl leading-snug"></p>
    </div>

    <!-- Vastausvaihtoehdot -->
    <div id="answers" class="space-y-2.5"></div>

    <!-- Seuraava-nappi -->
    <button id="btn-next" class="hidden w-full mt-5 py-3.5 rounded-2xl font-black text-white text-base transition-transform active:scale-97"
            style="background:linear-gradient(135deg,#7c3aed,#a855f7);box-shadow:0 4px 18px rgba(124,58,237,0.35)"
            onclick="nextQuestion()">
      Seuraava kysymys →
    </button>
    <button id="btn-finish" class="hidden w-full mt-5 py-3.5 rounded-2xl font-black text-white text-base transition-transform active:scale-97"
            style="background:linear-gradient(135deg,#16a34a,#22c55e);box-shadow:0 4px 18px rgba(22,163,74,0.35)"
            onclick="showResults()">
      Katso tulokset 🏆
    </button>
  </div>

  <!-- ── NÄKYMÄ 3: Tulokset ── -->
  <div id="screen-results" class="hidden text-center pop-in">
    <div id="result-emoji" class="text-6xl mt-4 mb-4"></div>
    <h2 class="text-3xl font-black text-gray-900 mb-1">Tulos</h2>
    <p id="result-topic" class="text-gray-400 font-semibold mb-6"></p>

    <div class="rounded-3xl p-6 mb-6"
         style="background:linear-gradient(135deg,rgba(139,92,246,0.11),rgba(255,255,255,0.97));border:1.5px solid rgba(139,92,246,0.20);box-shadow:0 6px 24px rgba(0,0,0,0.09)">
      <div id="score-big" class="text-6xl font-black" style="color:#7c3aed"></div>
      <div class="text-gray-500 font-semibold mt-1">oikein 10:stä</div>
      <div id="result-msg" class="mt-4 text-gray-700 font-bold text-lg"></div>
    </div>

    <div class="space-y-3">
      <button onclick="retryQuiz()" class="w-full py-3.5 rounded-2xl font-black text-white text-base"
              style="background:linear-gradient(135deg,#7c3aed,#a855f7);box-shadow:0 4px 18px rgba(124,58,237,0.30)">
        Pelaa uudelleen
      </button>
      <button onclick="goTopics()" class="w-full py-3.5 rounded-2xl font-black text-base"
              style="background:rgba(124,58,237,0.10);color:#7c3aed">
        Vaihda aihe
      </button>
    </div>
  </div>

</div>

<script src="questions-aikuiset.js"></script>
<script>
// ── KYSYMYSPISTEEN YHDISTÄMINEN (trivia.json / tasainen JSON-array) ───────────
/** Jakaa trivia.json -tyyliset kysymykset (id ad-hi-NNN) olemassa oleviin aiheisiin + Teknologia & Pelit. */
function mergeFlatTriviaQuestions(flat) {
  if (!Array.isArray(flat) || !flat.length) return;
  const byTopic = {};
  for (const q of flat) {
    if (!q || typeof q.id !== 'string' || !Array.isArray(q.opts)) continue;
    const m = /^ad-hi-(\d+)$/.exec(q.id);
    if (!m) continue;
    const n = parseInt(m[1], 10);
    let topicId;
    if (n >= 11 && n <= 40) topicId = 'yleistieto';
    else if (n >= 41 && n <= 70) topicId = 'tiede';
    else if (n >= 71 && n <= 100) topicId = 'viihde';
    else if (n >= 101 && n <= 130) topicId = 'urheilu';
    else if (n >= 131 && n <= 160) topicId = 'maantieto';
    else if (n >= 161 && n <= 190) topicId = 'teknologia';
    else continue;
    if (!byTopic[topicId]) byTopic[topicId] = [];
    byTopic[topicId].push(q);
  }
  for (const tid of Object.keys(byTopic)) {
    if (tid === 'teknologia') continue;
    const t = TOPICS.find(x => x.id === tid);
    if (!t) continue;
    const existing = new Set(t.questions.map(x => x.id));
    for (const q of byTopic[tid]) {
      if (!existing.has(q.id)) {
        t.questions.push(q);
        existing.add(q.id);
      }
    }
  }
  if (byTopic.teknologia && byTopic.teknologia.length) {
    const tech = {
      id: 'teknologia',
      name: 'Teknologia & Pelit',
      emoji: '💻',
      color: ['rgba(59,130,246,0.12)', 'rgba(59,130,246,0.22)', '#2563eb'],
      questions: [...byTopic.teknologia],
    };
    const idx = TOPICS.findIndex(x => x.id === 'teknologia');
    if (idx >= 0) TOPICS[idx] = tech;
    else TOPICS.push(tech);
  }
}

// ── TILA ──────────────────────────────────────────────────────────────────────
let currentTopic = null;
let questions    = [];
let qIndex       = 0;
let score        = 0;
let answered     = false;

// ── ALUSTUS ───────────────────────────────────────────────────────────────────
function init() {
  const list = document.getElementById('topic-list');
  TOPICS.forEach(t => {
    const [bg, border, accent] = t.color;
    const btn = document.createElement('button');
    btn.className = 'btn-topic w-full rounded-3xl px-5 py-4 text-left';
    btn.style.cssText = `background:linear-gradient(135deg,${bg},rgba(255,255,255,0.95));border:1.5px solid ${border};box-shadow:0 6px 24px rgba(0,0,0,0.09),inset 0 1px 0 rgba(255,255,255,0.90)`;
    btn.innerHTML = `
      <div class="flex items-center gap-4">
        <div class="text-4xl">${t.emoji}</div>
        <div>
          <div class="font-black text-gray-900 text-lg">${t.name}</div>
          <div class="text-sm font-semibold" style="color:${accent}">${t.questions.length} kysymystä</div>
        </div>
        <div class="ml-auto text-gray-300 text-xl">›</div>
      </div>`;
    btn.onclick = () => startQuiz(t.id);
    list.appendChild(btn);
  });
}

// ── KYSYMYSHISTORIA (localStorage) ───────────────────────────────────────────
const SEEN_KEY = 'tietovisa_seen_adult';

function getUnseen(topicId) {
  const data = JSON.parse(localStorage.getItem(SEEN_KEY) || '{}');
  const seen = new Set(data[topicId] || []);
  const all  = TOPICS.find(t => t.id === topicId).questions;
  const unseen = all.filter(q => !seen.has(q.id));
  return unseen.length >= 10 ? unseen : all; // resetoi jos liian vähän jäljellä
}

function markSeen(topicId, shownQuestions) {
  const data = JSON.parse(localStorage.getItem(SEEN_KEY) || '{}');
  const seen = new Set(data[topicId] || []);
  shownQuestions.forEach(q => seen.add(q.id));
  const total = TOPICS.find(t => t.id === topicId).questions.length;
  data[topicId] = seen.size >= total ? [] : [...seen]; // täysi kierto → reset
  localStorage.setItem(SEEN_KEY, JSON.stringify(data));
}

// ── VISALOGIIKKA ──────────────────────────────────────────────────────────────
function startQuiz(topicId) {
  currentTopic = TOPICS.find(t => t.id === topicId);
  questions    = shuffle(getUnseen(topicId)).slice(0, 10);
  qIndex       = 0;
  score        = 0;
  showScreen('quiz');
  renderQuestion();
}

function renderQuestion() {
  answered = false;
  const q = questions[qIndex];
  document.getElementById('q-label').textContent = `Kysymys ${qIndex + 1} / ${questions.length}`;
  document.getElementById('score-label').textContent = `${score} ✓`;
  document.getElementById('progress-bar').style.width = `${(qIndex / questions.length) * 100}%`;
  document.getElementById('q-category').textContent = currentTopic.emoji + '  ' + currentTopic.name;
  document.getElementById('q-text').textContent = q.q;
  document.getElementById('btn-next').classList.add('hidden');
  document.getElementById('btn-finish').classList.add('hidden');

  const container = document.getElementById('answers');
  container.innerHTML = '';
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'btn-answer w-full text-left rounded-2xl px-4 py-3.5 font-bold text-gray-800';
    btn.style.cssText = 'background:rgba(255,255,255,0.92);border:1.5px solid rgba(0,0,0,0.10);box-shadow:0 2px 8px rgba(0,0,0,0.07)';
    btn.innerHTML = `<span class="font-black text-gray-400 mr-2">${String.fromCharCode(65+i)}.</span>${opt}`;
    btn.onclick = () => selectAnswer(i, btn);
    container.appendChild(btn);
  });
}

function selectAnswer(index, btn) {
  if (answered) return;
  answered = true;
  const q = questions[qIndex];

  // Merkitään oikea & väärä
  const btns = document.getElementById('answers').querySelectorAll('button');
  btns.forEach((b, i) => {
    b.disabled = true;
    if (i === q.a) {
      b.classList.add('correct');
    } else if (i === index && index !== q.a) {
      b.classList.add('wrong');
    } else {
      b.classList.add('reveal');
    }
  });

  if (index === q.a) score++;

  // Seuraava tai tulokset
  if (qIndex < questions.length - 1) {
    document.getElementById('btn-next').classList.remove('hidden');
  } else {
    document.getElementById('btn-finish').classList.remove('hidden');
  }
}

function nextQuestion() {
  qIndex++;
  renderQuestion();
}

function showResults() {
  document.getElementById('progress-bar').style.width = '100%';
  markSeen(currentTopic.id, questions);
  showScreen('results');

  document.getElementById('score-big').textContent = `${score} / 10`;
  document.getElementById('result-topic').textContent = currentTopic.emoji + '  ' + currentTopic.name;

  let emoji, msg;
  if (score === 10)       { emoji = '🏆'; msg = 'Täydellinen tulos! Olet tietomestari!'; }
  else if (score >= 8)    { emoji = '🌟'; msg = 'Loistava suoritus!'; }
  else if (score >= 6)    { emoji = '👍'; msg = 'Hyvä tulos, jatka harjoittelua!'; }
  else if (score >= 4)    { emoji = '📚'; msg = 'Ei hullumpi — pari toistoa lisää!'; }
  else                    { emoji = '💪'; msg = 'Älä lannistu, yritä uudelleen!'; }

  document.getElementById('result-emoji').textContent = emoji;
  document.getElementById('result-msg').textContent = msg;
}

function retryQuiz()  { startQuiz(currentTopic.id); }
function goTopics()   { showScreen('topics'); }

function showScreen(name) {
  ['topics','quiz','results'].forEach(s => {
    document.getElementById(`screen-${s}`).classList.toggle('hidden', s !== name);
  });
  if (name === 'results') {
    document.getElementById('screen-results').classList.add('pop-in');
  }
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ── JSON-LATAUS ───────────────────────────────────────────────────────────────
document.getElementById('json-input').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const data = JSON.parse(ev.target.result);
      let topicCount = 0;
      let flatMerged = false;
      if (Array.isArray(data) && data.length && data[0] && data[0].q && Array.isArray(data[0].opts) && data[0].id && !data[0].questions) {
        mergeFlatTriviaQuestions(data);
        flatMerged = true;
        topicCount = new Set(
          data.map(q => {
            const m = /^ad-hi-(\d+)$/.exec(q.id || '');
            if (!m) return null;
            const n = parseInt(m[1], 10);
            if (n >= 11 && n <= 40) return 'yleistieto';
            if (n >= 41 && n <= 70) return 'tiede';
            if (n >= 71 && n <= 100) return 'viihde';
            if (n >= 101 && n <= 130) return 'urheilu';
            if (n >= 131 && n <= 160) return 'maantieto';
            if (n >= 161 && n <= 190) return 'teknologia';
            return null;
          }).filter(Boolean)
        ).size;
      } else {
        const topics = Array.isArray(data) ? data : data.topics || data.TOPICS;
        if (!Array.isArray(topics) || !topics.length || !topics[0].questions) {
          throw new Error('Väärä rakenne');
        }
        topicCount = topics.length;
        topics.forEach(t => {
          const idx = TOPICS.findIndex(x => x.id === t.id);
          if (idx >= 0) TOPICS[idx] = t; else TOPICS.push(t);
        });
      }
      localStorage.removeItem(SEEN_KEY);
      document.getElementById('topic-list').innerHTML = '';
      init();
      const status = document.getElementById('json-status');
      status.textContent = flatMerged
        ? `Ladattu: kysymyspankki → ${topicCount} aihetta ("${file.name}")`
        : `Ladattu: ${topicCount} aihetta tiedostosta "${file.name}"`;
      status.className = 'text-center text-xs font-semibold mt-2 text-green-600';
      status.classList.remove('hidden');
    } catch (err) {
      const status = document.getElementById('json-status');
      status.textContent = 'Virhe: tiedosto ei ole oikeassa muodossa.';
      status.className = 'text-center text-xs font-semibold mt-2 text-red-500';
      status.classList.remove('hidden');
    }
    e.target.value = '';
  };
  reader.readAsText(file);
});

async function boot() {
  try {
    const res = await fetch('trivia.json');
    if (res.ok) {
      const flat = await res.json();
      mergeFlatTriviaQuestions(flat);
    }
  } catch (_) { /* offline / file:// — peruspankki questions-aikuiset.js */ }
  init();
}
boot();

// ── SERVICE WORKER ────────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
</html>
